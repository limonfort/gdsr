[release]
current-version = "0.0.1-alpha.1"

version-files = [
    "Cargo.toml",
]

commit-message = "Release v{version}"
branch-name = "release/v{version}"
push = true
confirm = true

[changelog.section-labels]
"Bug Fixes" = ["bug"]
"New Features" = ["enhancement"]
"Performance" = ["performance"]
"IO" = ["io"]
"Geometry" = ["geometry"]
"Documentation" = ["documentation"]

[changelog]
ignore-contributors = ["dependabot[bot]"]
ignore-labels = ["Internal", "ci", "release", "wontfix", "good first issue", "help wanted", "duplicate", "needs-decision", "breaking-change"]
include-contributors = true
changelog-heading = "{version}"
